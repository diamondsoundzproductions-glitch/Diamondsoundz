{% extends 'base.html' %}

{% block content %}
<h2>Upload New Track</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Track Title" required>

    <input type="file" name="music" required>

    <button type="submit">Upload Track</button>
</form>
{% endblock %}
